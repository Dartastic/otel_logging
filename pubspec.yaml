name: otel_logging
description: Bridge `package:logging` records into the OpenTelemetry logs SDK so
  trace_id / span_id correlation lights up automatically for any Dart app
  using the Dart team's standard logging package.
version: 0.1.0-beta.1-wip
repository: https://github.com/dartastic/otel_logging
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0

dependencies:
  dartastic_opentelemetry: ^1.1.0-beta.4
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  logging: ^1.3.0

dev_dependencies:
  pubspec_parse: ^1.5.0
  pub_semver: ^2.0.0
  dart_flutter_team_lints: ^3.5.2
  test: ^1.26.3
